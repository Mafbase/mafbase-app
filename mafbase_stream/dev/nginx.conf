## Минимальная конфигурация nginx + nginx-rtmp для локальной разработки.
## НЕ предназначена для production: разрешена публикация и воспроизведение
## без аутентификации с любого адреса.

## RTMP корректно работает только в однопроцессном режиме —
## сессии привязаны к воркеру, и без shared-state статус и реконнект
## ведут себя непредсказуемо.
worker_processes 1;
events {
    worker_connections 1024;
}

# ---- RTMP ----
rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;

            # Для локалки — публикуем и проигрываем без ограничений.
            allow publish all;
            allow play all;

            # HLS-выход — можно открыть в браузере по http://localhost:8080/hls/<stream>.m3u8
            # Удобно для быстрой диагностики, когда VLC под рукой нет.
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 10s;
        }
    }
}

# ---- HTTP ----
http {
    sendfile on;
    tcp_nopush on;
    default_type application/octet-stream;

    server {
        listen 80;

        # Статус-страница nginx-rtmp: http://localhost:8080/stat
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        # HLS-плейлисты и сегменты: http://localhost:8080/hls/<stream>.m3u8
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # Простая health-страница для проверки, что http-часть жива
        location / {
            return 200 "mafbase-nginx-rtmp is up\n";
            add_header Content-Type text/plain;
        }
    }
}
