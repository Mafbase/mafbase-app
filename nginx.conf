error_log /dev/stdout error;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;

  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # These files must never be cached by the browser.
    # Flutter's service worker updates automatically when
    # flutter_service_worker.js changes between deployments —
    # but only if the browser can always fetch the latest version.
    location ~* ^/(index\.html|flutter_service_worker\.js|flutter_bootstrap\.js|manifest\.json)$ {
      add_header Cache-Control "no-store, no-cache, must-revalidate";
      add_header Pragma "no-cache";
      expires 0;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
