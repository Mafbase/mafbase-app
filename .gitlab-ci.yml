# This file is a template, and might need editing before it works on your project.
# This is a sample GitLab CI/CD configuration file that should run without any modifications.
# It demonstrates a basic 3 stage CI/CD pipeline. Instead of real tests or scripts,
# it uses echo commands to simulate the pipeline execution.
#
# A pipeline is composed of independent jobs that run scripts, grouped into stages.
# Stages run in sequential order, but jobs within stages run in parallel.
#
# For more information, see: https://docs.gitlab.com/ee/ci/yaml/index.html#stages
#
# You can copy and paste this template into a new `.gitlab-ci.yml` file.
# You should not add this template to an existing `.gitlab-ci.yml` file by using the `include:` keyword.
#
# To contribute improvements to CI/CD templates, please follow the Development guide at:
# https://docs.gitlab.com/ee/development/cicd/templates.html
# This specific template is located at:
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Getting-Started.gitlab-ci.yml
image: docker:20.10.16

before_script:
  - docker info

services:
  - docker:20.10.16-dind

stages:          # List of stages for jobs, and their order of execution
  - build
  - test
  - deploy

code_quality:
  stage: test
  tags:
    - docker
  image: "cirrusci/flutter:latest"
  before_script:
    - flutter pub global activate dart_code_metrics
    - export PATH="$PATH:$HOME/.pub-cache/bin"
  script:
    - metrics lib -r codeclimate  > gl-code-quality-report.json
  artifacts:
    reports:
      codequality: gl-code-quality-report.json

test:
  stage: test
  tags:
    - docker
  image: "cirrusci/flutter:latest"
  before_script:
    - flutter pub global activate junitreport
    - export PATH="$PATH:$HOME/.pub-cache/bin"
    - apt update
    - apt install cmake -y
    - apt install ninja-build -y
    - apt install clang -y
    - apt install pkg-config -y
  script:
    - flutter test integration_test --machine --coverage | tojunit -o report.xml
    - lcov --summary coverage/lcov.info
    - genhtml coverage/lcov.info --output=coverage
  coverage: '/lines\.*: \d+\.\d+\%/'
  artifacts:
    name: coverage
    paths:
      - $CI_PROJECT_DIR/coverage
    reports:
      junit: report.xml

build-job:       # This job runs in the build stage, which runs first.
  stage: build
  tags:
    - docker
  script:
    - docker build --pull --rm -f "Dockerfile" -t seating-generator-flutter:latest "."
    - docker save seating-generator-flutter:latest > flutter-image.tar
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - flutter-image.tar

deploy:
  image: ubuntu:latest
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  tags:
    - docker
  before_script:
    - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client git -y )'
    - eval $(ssh-agent -s)
    - echo "$SSH_KEY"
    - ssh-add <(echo "$SSH_KEY")
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p 22 "$DEPLOY_HOST" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script: 
    - scp flutter-image.tar root@"$DEPLOY_HOST":~/flutter-image.tar
    - ssh root@"$DEPLOY_HOST" "./load_flutter.sh"
    - ssh root@"$DEPLOY_HOST" "./update_flutter.sh"
  environment: production
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: pull
    paths:
      - flutter-image.tar
