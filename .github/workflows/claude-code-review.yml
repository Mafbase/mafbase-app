name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: [self-hosted, macOS]
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'

      - name: Run Claude Code Review
        uses: Mafbase/Mafbase-workflows/.github/actions/claude-code-review@main
        with:
          allowed_tools: '"Bash(flutter analyze:*)" "Bash(dart analyze:*)" "Bash(flutter test:*)"'
          system_prompt: 'IMPORTANT: Ты запущен в CI-окружении. Используй команды flutter и dart напрямую (без fvm). Не используй fvm flutter или fvm dart.'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
