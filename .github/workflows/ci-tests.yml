name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: [self-hosted, linux]
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Check for golden image changes
        id: golden-check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          else
            BASE_REF="HEAD~1"
          fi
          CHANGED=$(git diff --name-only "$BASE_REF" -- 'test/golden/' | grep '\.png$' | grep -v '_ci\.png$' || true)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Golden PNG changes detected:"
            echo "$CHANGED"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No golden PNG changes detected, skipping regeneration"
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Update CI golden images
        if: steps.golden-check.outputs.has_changes == 'true'
        run: flutter test --update-goldens test/golden/

      - name: Verify only CI golden images changed
        if: steps.golden-check.outputs.has_changes == 'true'
        run: |
          CHANGED=$(git diff --name-only)
          UNTRACKED=$(git ls-files --others --exclude-standard)
          ALL_CHANGES=$(printf '%s\n%s' "$CHANGED" "$UNTRACKED" | sed '/^$/d')

          if [ -z "$ALL_CHANGES" ]; then
            echo "No golden changes detected"
            exit 0
          fi

          UNEXPECTED=$(echo "$ALL_CHANGES" | grep -v '_ci\.png$' || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "::error::Unexpected files were modified by --update-goldens:"
            echo "$UNEXPECTED"
            exit 1
          fi

          echo "Only CI golden images changed (as expected):"
          echo "$ALL_CHANGES"

      - name: Commit and push updated goldens
        if: steps.golden-check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test/golden/goldens/*_ci.png
          git diff --cached --quiet || git commit -m "chore: update CI golden images"
          git push

      - name: Run tests
        run: flutter test
