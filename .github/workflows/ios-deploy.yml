name: iOS Deploy (Fastlane)

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: "Submit build for App Store review"
        required: false
        default: true
        type: boolean

jobs:
  deploy-ios:
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH for match repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_SSH_PRIVATE_KEY }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'

      - name: Fetch FFmpeg from artifactory
        run: |
          if [ -d mafbase_stream ]; then
            bash mafbase_stream/native/scripts/fetch_ffmpeg_ios.sh
          fi

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Setup Ruby (bundler cache)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Fastlane release
        working-directory: ios
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          SUBMIT_FOR_REVIEW: ${{ inputs.submit_for_review }}
        run: bundle exec fastlane ios release