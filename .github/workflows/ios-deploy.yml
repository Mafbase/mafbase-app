name: iOS Deploy

on:
  workflow_dispatch:
    inputs:
      bundle_id:
        description: iOS bundle identifier
        required: false
        default: ru.mafbase.app
        type: string
  workflow_call:
    inputs:
      bundle_id:
        required: false
        default: ru.mafbase.app
        type: string

jobs:
  deploy-ios:
    runs-on: [self-hosted, macOS]
    env:
      BUNDLE_ID: ${{ inputs.bundle_id || 'ru.mafbase.app' }}
      AGENT_TOOLSDIRECTORY: /Users/strelas/hostedtoolcache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate iOS signing secrets
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          test -n "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" || (echo "IOS_DISTRIBUTION_CERTIFICATE_BASE64 is not set" && exit 1)
          test -n "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" || (echo "IOS_DISTRIBUTION_CERTIFICATE_PASSWORD is not set" && exit 1)
          test -n "$IOS_PROVISIONING_PROFILE_BASE64" || (echo "IOS_PROVISIONING_PROFILE_BASE64 is not set" && exit 1)
          test -n "$APP_STORE_CONNECT_API_KEY_ID" || (echo "APP_STORE_CONNECT_API_KEY_ID is not set" && exit 1)
          test -n "$APP_STORE_CONNECT_ISSUER_ID" || (echo "APP_STORE_CONNECT_ISSUER_ID is not set" && exit 1)
          test -n "$APP_STORE_CONNECT_API_KEY_BASE64" || (echo "APP_STORE_CONNECT_API_KEY_BASE64 is not set" && exit 1)
      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Create temporary keychain
        env:
          KEYCHAIN_NAME: build.keychain
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_NAME"

      - name: Import certificate to keychain
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_NAME: build.keychain
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k "$KEYCHAIN_NAME" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          rm certificate.p12

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          PROFILE_UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          rm profile.mobileprovision

      - name: Create exportOptions.plist
        run: |
          cat > ios/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>L7YY6FT2M6</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${BUNDLE_ID}</key>
                  <string>${PROVISIONING_PROFILE_UUID}</string>
              </dict>
          </dict>
          </plist>
          EOF
      - name: Check signing identities
        run: |
          security find-identity -v -p codesigning
      - name: Build iOS IPA
        run: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/exportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: build/ios/ipa/*.ipa

      - name: Setup App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          python3 << 'PYTHON_SCRIPT'
          import re

          with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
              content = f.read()

          pattern = r'## \[(\d+\.\d+\.\d+)\] - \d{2}\.\d{2}\.\d{4}\n+((?:- .*\n?)*)'
          match = re.search(pattern, content)

          if match:
              changes = match.group(2).strip()
              changes = '\n'.join(line.lstrip('- ').strip() for line in changes.splitlines())
              print("Release notes extracted:")
              print(changes)
          else:
              print("No changelog entry found, using default message")
          PYTHON_SCRIPT

      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID" \
            --verbose

      - name: Cleanup keychain and credentials
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -rf ~/.private_keys || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/"${PROVISIONING_PROFILE_UUID}".mobileprovision || true
